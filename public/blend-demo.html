<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXFLAIR</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /*
      The source video must NOT use display:none — browsers skip decoding hidden videos.
      Instead, make it invisible but still in the rendering pipeline.
    */
    .source-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Canvas renders video frames — mix-blend-mode works with canvas content */
    .video-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .text-overlay h1 {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 10vw, 12rem);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff;
      mix-blend-mode: difference;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Video source: kept visible (1x1px, opacity:0) so the browser decodes frames -->
    <video class="source-video" autoplay muted loop playsinline>
      <source src="background.mp4" type="video/mp4" />
    </video>

    <!-- Canvas: video frames drawn here so mix-blend-mode can access pixel data -->
    <canvas class="video-canvas"></canvas>

    <div class="text-overlay">
      <h1>NEXFLAIR</h1>
    </div>
  </div>

  <script>
    const video = document.querySelector('.source-video');
    const canvas = document.querySelector('.video-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function drawFrame() {
      if (video.readyState >= 2) {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const cw = canvas.width;
        const ch = canvas.height;

        // object-fit: cover calculation
        const scale = Math.max(cw / vw, ch / vh);
        const sw = cw / scale;
        const sh = ch / scale;
        const sx = (vw - sw) / 2;
        const sy = (vh - sh) / 2;

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);
      }
      requestAnimationFrame(drawFrame);
    }

    window.addEventListener('resize', resize);
    resize();

    // Start rendering when video can play
    video.addEventListener('canplay', () => {
      video.play().catch(() => {});
      requestAnimationFrame(drawFrame);
    });

    // Fallback: click to play if autoplay is blocked
    window.addEventListener('click', () => {
      video.play().catch(() => {});
    }, { once: true });

    // If already ready, start immediately
    if (video.readyState >= 2) {
      requestAnimationFrame(drawFrame);
    }
  </script>
</body>
</html>
